<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://*.supabase.co 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://*.supabase.co wss://*.supabase.co http://127.0.0.1:* http://localhost:*; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com; img-src 'self' data: https://*.supabase.co https://ui-avatars.com https://www.transparenttextures.com;">
    
    <title>Student Portal - New Password</title>
    
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">
    <main class="container">
        <section class="hero-section forgot-hero">
            <div class="hero-content">
                <h1>Secure Your Account.</h1>
                <p>You're almost back in. Choose a strong new password to keep your student data safe.</p>
            </div>
        </section>

        <section class="form-section">
            <div class="form-wrapper">
                <div class="head-text">
                    <h2>Create New Password</h2>
                    <p>Please enter your new secure password below.</p>
                </div>

                <div id="alertBox" class="alert-box hidden"></div>

                <form id="resetForm" class="welcome-form">
                    <div class="input-group">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" placeholder="••••••••" required minlength="6">
                    </div>

                    <div class="input-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="••••••••" required>
                    </div>

                    <button type="submit" id="updateBtn" class="auth-btn">Update Password</button>
                </form>
            </div>
        </section>
    </main>
    
    <script src="../scripts/reset-pass.js"></script>
</body>
</html>
