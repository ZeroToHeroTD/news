<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://*.supabase.co 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://*.supabase.co wss://*.supabase.co http://127.0.0.1:* http://localhost:*; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com; img-src 'self' data: https://*.supabase.co https://ui-avatars.com https://www.transparenttextures.com;">    
    <title>Student Portal - Forgot Password</title>
    
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">
    <main class="container">
        <section class="hero-section forgot-hero">
            <div class="hero-content">
                <h1>No Worries.</h1>
                <p>Enter your email and we'll send you a secure link to reset your password.</p>
            </div>
        </section>

        <section class="form-section">
            <div class="form-wrapper">
                <div class="head-text">
                    <h2>Reset Password</h2>
                    <p>Instructions will be sent to your Gmail.</p>
                </div>

                <form id="forgotForm" class="welcome-form">
                    <div class="input-group">
                        <label for="resetEmail">Email Address</label>
                        <input type="email" id="resetEmail" placeholder="student@example.com" required>
                    </div>

                    <button type="submit" id="resetBtn" class="auth-btn">Send Reset Link</button>
                    <p class="signup-text">Remembered? <a href="index.html">Back to login</a></p>
                </form>
            </div>
        </section>
    </main>

    <script src="../scripts/forgotpass-script.js"></script>
</body>
</html>
