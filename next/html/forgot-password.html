<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal - Forgot Password</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="container">
    
    <section class="hero-section forgot-hero">
      <div class="hero-content">
        <h1>No Worries.</h1>
        <p>Enter your email address and we'll send you a secure link to reset your password so you can get back to your courses.</p>
      </div>
    </section>

    <section class="form-section">
      <div class="form-wrapper">
        <div class="head-text">
          <h2>Reset Password</h2>
          <p>We'll email you instructions to reset your password.</p>
        </div>

        <form id="forgotForm" class="welcome-form">
          <div class="input-group">
            <label for="resetEmail">Email Address</label>
            <input type="email" id="resetEmail" placeholder="student@university.edu" required>
          </div>

          <button type="submit" id="resetBtn" class="auth-btn">Send Reset Link</button>
          
          <p class="signup-text">Remember your password? <a href="index.html">Back to login</a></p>
        </form>
      </div>
    </section>

  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../scripts/forgotpass-script.js"></script>
</body>
</html>
