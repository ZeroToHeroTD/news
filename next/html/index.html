<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Portal</title>
<head>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="container">
      <section class="hero-section">
        <div class="hero-content">
          <h1>Welcome Back.</h1>
          <p>
            Access your courses, track your grades, and connect with campus
            resources all in one place.
          </p>
        </div>
      </section>

      <section class="form-section">
        <div class="form-wrapper">
          <div class="head-text">
            <h2>Student Portal</h2>
            <p>Please log in to your account</p>
          </div>

          <div id="alertBox" class="alert-box hidden"></div>

          <form id="loginForm" class="welcome-form">
            <div class="input-group">
              <label for="email">Email Address</label>
              <input
                type="email"
                id="email"
                placeholder="student@university.edu"
                required
              />
            </div>

            <div class="input-group">
              <label for="password">Password</label>
              <input
                type="password"
                id="password"
                placeholder="••••••••"
                required
              />
            </div>

            <div class="form-actions">
              <a href="forgot-password.html" class="forgot-link"
                >Forgot password?</a
              >
            </div>

            <button type="submit" id="loginBtn" class="auth-btn">Log in</button>

            <p class="signup-text">
              Don't have an account? <a href="sign-up.html">Sign up now</a>
            </p>
          </form>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../scripts/login-script.js"></script>
  </body>
</html>
