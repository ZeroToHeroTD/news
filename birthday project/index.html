<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Present</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <audio id="bg-music" loop>
        <source src="Illumoria.mp3" type="audio/mpeg">
    </audio>

    <section class="page active" id="page1">
        <div class="container" id="container1">
            <div class="img-container">
                <img src="cat.gif" alt="cute gif">
            </div>
            <div class="container-text">
                <h2>Hello aweng,<br>this is especially made for you.</h2>
                <p>You mean everything to me,<br>I love you the most.</p>
                <button class="btn" onclick="btnClick()">Click me</button>
            </div>
        </div>
    </section>

    <section class="page" id="page2">
        <canvas id="canvas"></canvas>
        <div id="line1" class="text"></div>
        
        <div id="line2" class="text">
            <h2 id="final-birthday-text"></h2>
        </div>
    </section>
    
    <script src="script.js"></script>
</body>
</html>
